# DisplayOS Configuration File
# ============================
# Location: /etc/displayos/config.conf
# Permissions: 600 (readable only by root and displayos user)
#
# This file controls the behavior of DisplayOS kiosk mode.
# Changes require a service restart: sudo systemctl restart displayos-kiosk

# =============================================================================
# DISPLAY SETTINGS
# =============================================================================

# Target URL to display in kiosk mode
# This is the primary URL loaded when the browser starts
# Examples:
#   TARGET_URL=https://example.com
#   TARGET_URL=https://dashboard.example.com/display
#   TARGET_URL=file:///var/www/html/index.html
TARGET_URL=https://example.com

# Browser selection: chromium or firefox
# Chromium is recommended for better kiosk mode support
# Firefox will be used as fallback if Chromium fails
BROWSER=chromium

# Browser window behavior
# fullscreen: Maximized kiosk mode (default)
# windowed: Normal window (for debugging)
DISPLAY_MODE=fullscreen

# Screen resolution override (optional)
# Leave empty to use auto-detected resolution
# Format: WIDTHxHEIGHT
# Example: RESOLUTION=1920x1080
RESOLUTION=

# =============================================================================
# NETWORK SETTINGS
# =============================================================================

# WiFi credentials (optional)
# Leave empty if using ethernet or configuring WiFi manually
# WARNING: These credentials are stored in plain text
# Ensure this file has restricted permissions (chmod 600)
WIFI_SSID=
WIFI_PASSWORD=

# WiFi security type: WPA-PSK, WPA-EAP, WEP, or OPEN
WIFI_SECURITY=WPA-PSK

# Static IP configuration (optional)
# Leave empty for DHCP (recommended)
# STATIC_IP=192.168.1.100
# STATIC_GATEWAY=192.168.1.1
# STATIC_DNS=8.8.8.8,8.8.4.4
STATIC_IP=
STATIC_GATEWAY=
STATIC_DNS=

# =============================================================================
# WATCHDOG SETTINGS
# =============================================================================

# Watchdog timeout in seconds
# The browser will be restarted if unresponsive for this duration
# Minimum: 10, Maximum: 300, Default: 30
WATCHDOG_TIMEOUT=30

# Enable watchdog service
# Set to false to disable automatic browser restart
WATCHDOG_ENABLED=true

# Maximum restart attempts before giving up
# Set to 0 for unlimited restarts
WATCHDOG_MAX_RESTARTS=0

# Delay between restart attempts (seconds)
WATCHDOG_RESTART_DELAY=5

# =============================================================================
# SYSTEM SETTINGS
# =============================================================================

# Hostname for this display
# Useful for identifying multiple displays on a network
HOSTNAME=displayos

# Timezone (see: timedatectl list-timezones)
TIMEZONE=UTC

# Keyboard layout
# Common values: us, gb, de, fr, no, se, dk
KEYBOARD_LAYOUT=no

# Keyboard variant (optional)
# Example: KEYBOARD_VARIANT=dvorak
KEYBOARD_VARIANT=

# =============================================================================
# USER INTERFACE
# =============================================================================

# Enable virtual keyboard for touchscreens
VIRTUAL_KEYBOARD=false

# Virtual keyboard theme: default, dark, small
VIRTUAL_KEYBOARD_THEME=default

# Show mouse cursor
# Set to false for touchscreen-only displays
SHOW_CURSOR=true

# Cursor auto-hide timeout (seconds, 0 to disable)
CURSOR_HIDE_TIMEOUT=5

# =============================================================================
# SECURITY SETTINGS
# =============================================================================

# Enable SSH access (for remote management)
# Default: false for security
SSH_ENABLED=false

# Enable automatic security updates
AUTO_UPDATES=true

# Exit kiosk mode password
# Required when pressing Ctrl+Alt+Del
# Generate with: openssl passwd -6
KIOSK_EXIT_PASSWORD=$6$rounds=4096$salt$hashedpassword

# =============================================================================
# LOGGING
# =============================================================================

# Enable verbose logging
DEBUG_MODE=false

# Log file location
LOG_FILE=/var/log/displayos/kiosk.log

# Log rotation: daily, weekly, monthly
LOG_ROTATION=daily

# Number of log files to keep
LOG_RETENTION=7

# =============================================================================
# ADVANCED BROWSER OPTIONS
# =============================================================================

# Additional Chromium flags (space-separated)
# Example: CHROMIUM_FLAGS=--disable-gpu --disable-software-rasterizer
CHROMIUM_FLAGS=

# Additional Firefox flags (space-separated)
# Example: FIREFOX_FLAGS=-safe-mode
FIREFOX_FLAGS=

# Browser cache size in MB (0 to disable caching)
BROWSER_CACHE_SIZE=100

# Clear browser data on startup
CLEAR_BROWSER_DATA=false

# User agent override (optional)
# Leave empty to use default
USER_AGENT=

# =============================================================================
# DISPLAY POWER MANAGEMENT
# =============================================================================

# Enable display power management (screen blanking)
DPMS_ENABLED=false

# Time before screen blanks (minutes, 0 to disable)
DPMS_TIMEOUT=0

# Enable scheduled display on/off
SCHEDULE_ENABLED=false

# Display on time (24-hour format, e.g., 08:00)
SCHEDULE_ON=08:00

# Display off time (24-hour format, e.g., 22:00)
SCHEDULE_OFF=22:00
