# DisplayOS Preseed Configuration
# ================================
# Unattended installation configuration for Debian Installer
# Only prompts for disk selection confirmation

# =============================================================================
# LOCALIZATION
# =============================================================================

# Locale and language
d-i debian-installer/locale string en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US

# Keyboard configuration (Norwegian layout as default, change as needed)
d-i keyboard-configuration/xkb-keymap select no
d-i keyboard-configuration/layoutcode string no
d-i keyboard-configuration/variantcode string

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

# Network interface selection
d-i netcfg/choose_interface select auto

# Hostname and domain
d-i netcfg/get_hostname string displayos
d-i netcfg/get_domain string local

# Disable WEP key prompt
d-i netcfg/wireless_wep string

# =============================================================================
# MIRROR AND APT
# =============================================================================

# Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# APT configuration
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true

# =============================================================================
# TIME AND CLOCK
# =============================================================================

# Time zone
d-i time/zone string UTC
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# =============================================================================
# PARTITIONING
# =============================================================================

# Partitioning method - use entire disk
# NOTE: This will still prompt for disk confirmation
d-i partman-auto/method string regular

# Disk selection (auto-select first disk, but prompt for confirmation)
d-i partman-auto/disk string /dev/sda
d-i partman-auto/choose_recipe select atomic

# Partition scheme - single partition for simplicity
d-i partman-auto/expert_recipe string                         \
      boot-root ::                                            \
              512 512 512 fat32                               \
                      $primary{ }                             \
                      $bootable{ }                            \
                      method{ efi }                           \
                      format{ }                               \
              .                                               \
              10000 10000 -1 ext4                              \
                      $primary{ }                             \
                      method{ format } format{ }              \
                      use_filesystem{ } filesystem{ ext4 }    \
                      mountpoint{ / }                         \
              .

# Confirm partitioning (this is the ONLY user prompt)
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean false

# Skip LUKS by default (enable in config for encrypted installs)
d-i partman-crypto/passphrase string
d-i partman-crypto/passphrase-again string

# =============================================================================
# USER ACCOUNTS
# =============================================================================

# Skip root account (use sudo instead)
d-i passwd/root-login boolean false

# Create displayos user
d-i passwd/user-fullname string DisplayOS User
d-i passwd/username string displayos
# Password: displayos (change after first boot!)
# Generated with: mkpasswd -m sha-512
d-i passwd/user-password-crypted string $6$rounds=4096$randomsalt$kL8zJ9xJ6xJ5xJ4xJ3xJ2xJ1xJ0xJzJyJxJwJvJuJtJsJrJqJpJoJnJmJlJkJjJiJhJgJfJeJdJcJbJaJ.

# User groups
d-i passwd/user-default-groups string sudo audio video netdev

# =============================================================================
# PACKAGE SELECTION
# =============================================================================

# Task selection (minimal)
tasksel tasksel/first multiselect standard

# Additional packages (handled by our scripts)
d-i pkgsel/include string sudo openssh-server

# Upgrade policy
d-i pkgsel/upgrade select full-upgrade

# Popularity contest
popularity-contest popularity-contest/participate boolean false

# =============================================================================
# BOOT LOADER
# =============================================================================

# GRUB installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

# =============================================================================
# FINISH
# =============================================================================

# Avoid reboot message
d-i finish-install/reboot_in_progress note

# Run our post-installation script
d-i preseed/late_command string \
    in-target /bin/bash -c 'curl -sSL https://raw.githubusercontent.com/yourusername/displayos/main/scripts/post-install.sh | bash'

# =============================================================================
# LUKS ENCRYPTION (Optional)
# =============================================================================
# Uncomment and configure for encrypted installations
# 
# d-i partman-auto/method string crypto
# d-i partman-crypto/passphrase string YOUR_ENCRYPTION_PASSWORD
# d-i partman-crypto/passphrase-again string YOUR_ENCRYPTION_PASSWORD
# d-i partman-auto-crypto/erase_disks boolean false
